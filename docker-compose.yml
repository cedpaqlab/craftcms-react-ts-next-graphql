services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: craft
      MYSQL_USER: craft
      MYSQL_PASSWORD: craft
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  craft:
    build:
      context: .
      dockerfile: docker/craft/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - craft_app_data:/var/www/html
    environment:
      CRAFT_ENVIRONMENT: dev
      DB_DRIVER: mysql
      DB_SERVER: db
      DB_DATABASE: craft
      DB_USER: craft
      DB_PASSWORD: craft
      DB_PORT: 3306
      CRAFT_ADMIN_EMAIL: admin@demo.local
      CRAFT_ADMIN_USERNAME: admin
      CRAFT_ADMIN_PASSWORD: Demo123!
      CRAFT_SITE_NAME: Headless
      CRAFT_SITE_URL: http://localhost:8080
      CRAFT_LANGUAGE: en-US
    ports:
      - "8080:80"

volumes:
  db_data:
  craft_app_data:

